<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>MarombaCount</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --bg: #0a0a0a;
      --left-bg: #0d0d0d;
      --right-bg: #0f0d09;
      --accent-left: #e8ff00;
      --accent-right: #ff6b00;
      --text: #f0f0f0;
      --dim: #444;
      --divider: #1e1e1e;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* Wake Lock overlay hint */
    #wake-hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 100;
      pointer-events: none;
      transition: opacity 1s;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* ── SETTINGS MODAL ── */
    #settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    #settings-modal.open { display: flex; }

    .modal-box {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 28px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
      text-align: center;
    }
    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .setting-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
    }
    .setting-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--text);
      text-align: center;
      line-height: 1;
    }
    .setting-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #2a2a2a;
      background: #1a1a1a;
      color: var(--text);
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      line-height: 1;
    }
    .ctrl-btn:active { transform: scale(0.92); background: #252525; }

    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preset-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #888;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:active, .preset-btn.active {
      border-color: var(--accent-right);
      color: var(--accent-right);
      background: rgba(255,107,0,0.08);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }
    .btn-save, .btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-save {
      background: var(--accent-right);
      color: #000;
    }
    .btn-save:active { transform: scale(0.97); }
    .btn-cancel {
      background: #1e1e1e;
      color: #666;
      border: 1px solid #2a2a2a;
    }
    .btn-cancel:active { background: #252525; }

    /* ── LEFT PANEL (séries) ── */
    #panel-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--left-bg);
      position: relative;
      cursor: pointer;
      overflow: clip;
      border-right: 1px solid var(--divider);
    }

    #panel-left::before {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,255,0,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .panel-label {
      position: absolute;
      top: 20px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
    }

    .series-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      pointer-events: none;
    }

    .series-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 160px);
      line-height: 0.9;
      color: var(--accent-left);
      transition: transform 0.08s ease;
      text-shadow: 0 0 40px rgba(232,255,0,0.2);
    }

    .series-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 3vw, 22px);
      letter-spacing: 5px;
      color: rgba(232,255,0,0.4);
      text-transform: uppercase;
    }

    .series-goal {
      margin-top: 12px;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--dim);
      font-weight: 300;
    }

    .ripple-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-anim 0.5s ease-out forwards;
      pointer-events: none;
    }

    .ripple-left {
      background: rgba(232,255,0,0.08);
    }
    .ripple-right {
      background: rgba(255,107,0,0.08);
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* bottom-left: reset btn */
    #btn-reset-series {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      right: max(20px, env(safe-area-inset-right, 20px));
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #444;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btn-reset-series:active { border-color: var(--accent-left); color: var(--accent-left); }

    /* ── RIGHT PANEL (descanso) ── */
    #panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--right-bg);
      position: relative;
      cursor: pointer;
      overflow: clip;
    }

    #panel-right::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .rest-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .rest-timer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 160px);
      line-height: 0.9;
      color: var(--accent-right);
      transition: color 0.3s;
      text-shadow: 0 0 40px rgba(255,107,0,0.2);
    }

    .rest-timer.running { color: var(--accent-right); }
    .rest-timer.paused { color: #888; animation: blink-pause 1s step-end infinite; }
    .rest-timer.done { color: #e8ff00; animation: pulse-done 0.6s ease infinite alternate; }

    @keyframes blink-pause {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes pulse-done {
      from { opacity: 1; }
      to { opacity: 0.5; }
    }

    .rest-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 3vw, 22px);
      letter-spacing: 5px;
      color: rgba(255,107,0,0.4);
      text-transform: uppercase;
    }

    .rest-status {
      margin-top: 12px;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--dim);
      font-weight: 300;
      text-transform: uppercase;
    }

    /* circular progress */
    .rest-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .rest-ring circle {
      transition: stroke-dashoffset 1s linear;
    }

    /* settings btn */
    #btn-settings {
      position: absolute;
      top: max(20px, env(safe-area-inset-top, 20px));
      right: max(20px, env(safe-area-inset-right, 20px));
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 50%;
      color: #444;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: all 0.2s;
    }
    #btn-settings:active { border-color: var(--accent-right); color: var(--accent-right); }

    /* configured time badge */
    #rest-config-badge {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2px;
      color: #333;
      text-transform: uppercase;
      font-weight: 400;
      pointer-events: none;
    }

    /* tap hint animation */
    .tap-hint {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 3px;
      color: #2a2a2a;
      text-transform: uppercase;
      animation: hint-pulse 2s ease infinite;
      pointer-events: none;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── FLASH overlay on panel tap ── */
    .flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      animation: flash-anim 0.25s ease-out forwards;
    }
    .flash-left { background: rgba(232,255,0,0.06); }
    .flash-right { background: rgba(255,107,0,0.08); }

    @keyframes flash-anim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* number bump animation */
    @keyframes bump {
      0% { transform: scale(1); }
      30% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .bump { animation: bump 0.2s ease-out; }

  </style>
</head>
<body>

<div id="wake-hint">TELA ATIVA</div>

<div id="app">

  <!-- LEFT: Série counter -->
  <div id="panel-left">
    <div class="panel-label">SÉRIES</div>
    <div class="ripple-container" id="ripple-left"></div>
    <div class="series-display">
      <div class="series-number" id="series-num">0</div>
      <div class="series-word">SÉRIES</div>
      <div class="series-goal" id="series-goal">TOQUE PARA CONTAR</div>
    </div>
    <button id="btn-reset-series">↺ RESETAR</button>
  </div>

  <!-- RIGHT: Rest timer -->
  <div id="panel-right">
    <div class="panel-label">DESCANSO</div>
    <div class="ripple-container" id="ripple-right"></div>

    <svg class="rest-ring" id="rest-ring-svg" width="260" height="260" viewBox="0 0 260 260">
      <circle cx="130" cy="130" r="118" fill="none" stroke="#1a1a1a" stroke-width="3"/>
      <circle id="ring-progress" cx="130" cy="130" r="118"
        fill="none" stroke="#ff6b00" stroke-width="3"
        stroke-linecap="round"
        stroke-dasharray="741.4"
        stroke-dashoffset="741.4"
        transform="rotate(-90 130 130)"
        opacity="0.5"/>
    </svg>

    <div class="rest-display">
      <div class="rest-timer" id="rest-timer">00:00</div>
      <div class="rest-word">DESCANSO</div>
      <div class="rest-status" id="rest-status">TOQUE PARA INICIAR</div>
    </div>

    <button id="btn-settings">⚙</button>
    <div id="rest-config-badge" id="rest-badge">60s CONFIGURADO</div>
  </div>

</div>

<!-- Settings Modal -->
<div id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">CONFIGURAR</div>

    <div class="setting-row">
      <div class="setting-label">Tempo de Descanso</div>
      <div class="setting-controls">
        <button class="ctrl-btn" id="btn-dec-rest">−</button>
        <div class="setting-value" id="modal-rest-val">60s</div>
        <button class="ctrl-btn" id="btn-inc-rest">+</button>
      </div>
      <div class="presets" id="rest-presets">
        <button class="preset-btn" data-val="30">30s</button>
        <button class="preset-btn" data-val="45">45s</button>
        <button class="preset-btn" data-val="60">1min</button>
        <button class="preset-btn" data-val="90">1:30</button>
        <button class="preset-btn" data-val="120">2min</button>
        <button class="preset-btn" data-val="180">3min</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-modal-cancel">CANCELAR</button>
      <button class="btn-save" id="btn-modal-save">SALVAR</button>
    </div>
  </div>
</div>

<script>
  // ── STATE ──
  let seriesCount = 0;
  let restDuration = 60; // seconds
  let modalRestDuration = 60;
  let restRemaining = 0;
  let restInterval = null;
  let wakeLock = null;

  const RING_CIRCUMFERENCE = 741.4;

  // ── ELEMENTS ──
  const seriesNum = document.getElementById('series-num');
  const seriesGoal = document.getElementById('series-goal');
  const restTimer = document.getElementById('rest-timer');
  const restStatus = document.getElementById('rest-status');
  const panelLeft = document.getElementById('panel-left');
  const panelRight = document.getElementById('panel-right');
  const btnResetSeries = document.getElementById('btn-reset-series');
  const btnSettings = document.getElementById('btn-settings');
  const settingsModal = document.getElementById('settings-modal');
  const btnModalCancel = document.getElementById('btn-modal-cancel');
  const btnModalSave = document.getElementById('btn-modal-save');
  const modalRestVal = document.getElementById('modal-rest-val');
  const btnDecRest = document.getElementById('btn-dec-rest');
  const btnIncRest = document.getElementById('btn-inc-rest');
  const ringProgress = document.getElementById('ring-progress');
  const restBadge = document.getElementById('rest-config-badge');
  const wakeHint = document.getElementById('wake-hint');

  // ── WAKE LOCK ──
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeHint.textContent = '🔒 TELA ATIVA';
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible') {
            wakeLock = await navigator.wakeLock.request('screen');
          }
        });
      }
    } catch(e) {
      wakeHint.textContent = 'Mantenha tela ativa manualmente';
    }
  }
  requestWakeLock();
  setTimeout(() => { wakeHint.style.opacity = '0'; }, 3000);

  // ── HELPERS ──
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateRing(remaining, total) {
    const pct = total > 0 ? remaining / total : 0;
    const offset = RING_CIRCUMFERENCE * (1 - pct);
    ringProgress.style.strokeDashoffset = offset;
  }

  function updateRestBadge() {
    restBadge.textContent = formatTime(restDuration) + ' CONFIGURADO';
  }

  function formatModalVal(s) {
    if (s < 60) return s + 's';
    const m = Math.floor(s/60);
    const sec = s % 60;
    return sec === 0 ? m + 'min' : m + ':' + String(sec).padStart(2,'0');
  }

  function addRipple(container, x, y, cls) {
    const ripple = document.createElement('div');
    ripple.className = `ripple ${cls}`;
    const size = Math.max(container.offsetWidth, container.offsetHeight) * 1.5;
    ripple.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${x - size/2}px; top: ${y - size/2}px;
    `;
    container.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  function bumpElement(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    el.addEventListener('animationend', () => el.classList.remove('bump'), {once:true});
  }

  // ── SERIES ──
  panelLeft.addEventListener('click', (e) => {
    if (e.target === btnResetSeries) return;
    seriesCount++;
    seriesNum.textContent = seriesCount;
    seriesGoal.textContent = seriesCount === 1 ? '1ª SÉRIE' : `${seriesCount}ª SÉRIE`;
    bumpElement(seriesNum);

    const rect = panelLeft.getBoundingClientRect();
    addRipple(document.getElementById('ripple-left'), e.clientX - rect.left, e.clientY - rect.top, 'ripple-left');

    // flash
    const flash = document.createElement('div');
    flash.className = 'flash flash-left';
    panelLeft.appendChild(flash);
    flash.addEventListener('animationend', () => flash.remove());

    // haptic
    if (navigator.vibrate) navigator.vibrate(30);
  });

  btnResetSeries.addEventListener('click', (e) => {
    e.stopPropagation();
    seriesCount = 0;
    seriesNum.textContent = '0';
    seriesGoal.textContent = 'TOQUE PARA CONTAR';
    if (navigator.vibrate) navigator.vibrate([20,30,20]);
  });

  // ── REST TIMER ──
  // States: 'idle' | 'running' | 'paused' | 'done'
  let restState = 'idle';
  let longPressTimer = null;
  let longPressTriggered = false;

  function runRestInterval() {
    restInterval = setInterval(() => {
      restRemaining--;
      restTimer.textContent = formatTime(restRemaining);
      updateRing(restRemaining, restDuration);
      if (restRemaining <= 0) {
        clearInterval(restInterval);
        restState = 'done';
        restTimer.className = 'rest-timer done';
        restStatus.textContent = 'PRONTO! PRÓXIMA SÉRIE';
        restTimer.textContent = '00:00';
        if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
        updateRing(0, restDuration);
      }
    }, 1000);
  }

  function startRest() {
    clearInterval(restInterval);
    restRemaining = restDuration;
    restState = 'running';
    restTimer.textContent = formatTime(restRemaining);
    restTimer.className = 'rest-timer running';
    restStatus.textContent = 'DESCANSANDO...';
    updateRing(restRemaining, restDuration);
    runRestInterval();
    if (navigator.vibrate) navigator.vibrate(40);
  }

  function pauseRest() {
    clearInterval(restInterval);
    restState = 'paused';
    restTimer.className = 'rest-timer paused';
    restStatus.textContent = 'PAUSADO — TOQUE PARA CONTINUAR';
    if (navigator.vibrate) navigator.vibrate(20);
  }

  function resumeRest() {
    restState = 'running';
    restTimer.className = 'rest-timer running';
    restStatus.textContent = 'DESCANSANDO...';
    runRestInterval();
    if (navigator.vibrate) navigator.vibrate(20);
  }

  function resetRest() {
    clearInterval(restInterval);
    restState = 'idle';
    restRemaining = 0;
    restTimer.textContent = formatTime(restDuration);
    restTimer.className = 'rest-timer';
    restStatus.textContent = 'TOQUE PARA INICIAR';
    updateRing(0, restDuration);
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
  }

  function handleRightTap(x, y) {
    const rect = panelRight.getBoundingClientRect();
    addRipple(document.getElementById('ripple-right'), x - rect.left, y - rect.top, 'ripple-right');
    const flash = document.createElement('div');
    flash.className = 'flash flash-right';
    panelRight.appendChild(flash);
    flash.addEventListener('animationend', () => flash.remove());

    if (restState === 'idle' || restState === 'done') {
      startRest();
    } else if (restState === 'running') {
      pauseRest();
    } else if (restState === 'paused') {
      resumeRest();
    }
    bumpElement(restTimer);
  }

  panelRight.addEventListener('touchstart', (e) => {
    if (e.target === btnSettings) return;
    longPressTriggered = false;
    longPressTimer = setTimeout(() => {
      longPressTriggered = true;
      resetRest();
      const flash = document.createElement('div');
      flash.className = 'flash flash-right';
      flash.style.background = 'rgba(255,255,255,0.07)';
      panelRight.appendChild(flash);
      flash.addEventListener('animationend', () => flash.remove());
    }, 600);
  }, { passive: true });

  panelRight.addEventListener('touchmove', () => {
    clearTimeout(longPressTimer);
  }, { passive: true });

  panelRight.addEventListener('touchend', (e) => {
    clearTimeout(longPressTimer);
    if (longPressTriggered || e.target === btnSettings) return;
    const t = e.changedTouches[0];
    handleRightTap(t.clientX, t.clientY);
  }, { passive: true });

  panelRight.addEventListener('click', (e) => {
    if (e.target === btnSettings || 'ontouchstart' in window) return;
    handleRightTap(e.clientX, e.clientY);
  });

  // ── SETTINGS MODAL ──
  function openModal() {
    modalRestDuration = restDuration;
    updateModalDisplay();
    settingsModal.classList.add('open');
  }

  function updateModalDisplay() {
    modalRestVal.textContent = formatModalVal(modalRestDuration);
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) === modalRestDuration);
    });
  }

  btnSettings.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal();
  });

  btnModalCancel.addEventListener('click', () => settingsModal.classList.remove('open'));

  btnModalSave.addEventListener('click', () => {
    restDuration = modalRestDuration;
    settingsModal.classList.remove('open');
    // reset timer display
    clearInterval(restInterval);
    restState = 'idle';
    restTimer.textContent = formatTime(restDuration);
    restTimer.className = 'rest-timer';
    restStatus.textContent = 'TOQUE PARA INICIAR';
    updateRing(0, restDuration);
    updateRestBadge();
    if (navigator.vibrate) navigator.vibrate(30);
  });

  btnDecRest.addEventListener('click', () => {
    if (modalRestDuration > 5) {
      modalRestDuration = modalRestDuration <= 30 ? modalRestDuration - 5 : modalRestDuration - 15;
      if (modalRestDuration < 5) modalRestDuration = 5;
      updateModalDisplay();
    }
  });

  btnIncRest.addEventListener('click', () => {
    modalRestDuration = modalRestDuration < 30 ? modalRestDuration + 5 : modalRestDuration + 15;
    if (modalRestDuration > 600) modalRestDuration = 600;
    updateModalDisplay();
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modalRestDuration = parseInt(btn.dataset.val);
      updateModalDisplay();
    });
  });

  // Close modal on backdrop click
  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) settingsModal.classList.remove('open');
  });

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── INIT ──
  restTimer.textContent = formatTime(restDuration);
  updateRestBadge();

  // Prevent double-tap zoom
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  let lastTap = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  // Force landscape hint on portrait
  window.addEventListener('orientationchange', () => {
    // just let it flow, layout adapts
  });
</script>
</body>
</html>
